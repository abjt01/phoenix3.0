<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Notification — Phoenix 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0a;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            padding: 40px 20px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background: #111;
            border: 1px solid #222;
        }

        .top-rule {
            height: 1px;
            background: #ff6900;
            opacity: 0.5;
        }

        /* Header */
        .header {
            padding: 20px 32px 18px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .admin-badge {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 5px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: -0.01em;
        }

        .header-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 3px;
        }

        .header-right {
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            align-self: flex-start;
            margin-top: 2px;
        }

        /* Body */
        .body {
            padding: 28px 32px;
        }

        /* Section label */
        .section-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.18);
            margin-bottom: 12px;
        }

        /* Detail rows */
        .detail-row {
            display: flex;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
        }

        .detail-row:first-child {
            border-top: 1px solid #1a1a1a;
        }

        .detail-key {
            width: 110px;
            flex-shrink: 0;
            color: rgba(255, 255, 255, 0.3);
        }

        .detail-val {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            word-break: break-all;
        }

        /* Rule */
        .rule {
            height: 1px;
            background: #1f1f1f;
            margin: 4px 0 24px;
        }

        /* Events list */
        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .event-item:first-child {
            border-top: 1px solid #1a1a1a;
        }

        .event-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 106, 0, 0.5);
            flex-shrink: 0;
        }

        /* Teammates */
        .teammate-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.65);
        }

        .teammate-item:first-child {
            border-top: 1px solid #1a1a1a;
        }

        .teammate-index {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.2);
            width: 20px;
            flex-shrink: 0;
        }

        /* Footer */
        .footer {
            padding: 14px 32px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .footer-brand {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.15);
        }

        .footer-note {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 0.05em;
        }

        .bottom-rule {
            height: 1px;
            background: #1a1a1a;
        }

        @media (max-width: 480px) {

            .header,
            .body,
            .footer {
                padding-left: 20px;
                padding-right: 20px;
            }

            .detail-key {
                width: 88px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top-rule"></div>

        <div class="header">
            <div class="header-left">
                <div class="admin-badge">Phoenix 3.0 · Admin</div>
                <div class="header-title">New Registration</div>
                <div class="header-date">{{REGISTERED_DATE}}</div>
            </div>
            <div class="header-right">Incoming</div>
        </div>

        <div class="body">

            <!-- Participant -->
            <div class="section-label">Participant</div>
            <div style="margin-bottom: 24px;">
                <div class="detail-row">
                    <span class="detail-key">Name</span>
                    <span class="detail-val">{{PARTICIPANT_NAME}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Email</span>
                    <span class="detail-val">{{EMAIL}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">College</span>
                    <span class="detail-val">{{COLLEGE}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Phone</span>
                    <span class="detail-val">{{PHONE}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-key">Team Size</span>
                    <span class="detail-val">{{TEAM_SIZE}}</span>
                </div>
            </div>

            <div class="rule"></div>

            <!-- Events -->
            <div class="section-label">Events Registered</div>
            <div style="margin-bottom: 24px;">
                {{EVENTS_HTML}}
            </div>

            <div class="rule"></div>

            <!-- Team -->
            <div class="section-label">Team Members</div>
            <div>
                {{TEAMMATES_HTML}}
            </div>

        </div>

        <div class="footer">
            <div class="footer-brand">Phoenix 3.0</div>
            <div class="footer-note">Admin Notification · Do not reply</div>
        </div>

        <div class="bottom-rule"></div>
    </div>
</body>

</html>
